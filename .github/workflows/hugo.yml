name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.121.1"
    steps:
      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          
      - name: Install Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
          
      - name: Install Dart Sass Embedded
        run: sudo snap install dart-sass-embedded
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      
      - name: Install Node.js dependencies for URL Mappings
        run: npm install
      
      - name: Generate URL Mappings
        env:
          HUGO_BASEURL: ${{ steps.pages.outputs.base_url }}
        run: |
          npm run generate:url-mappings
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-release-email:
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check notification flag in DE next.md
        id: next_notification
        run: |
          if grep -Eq '^notification:\s*true\s*$' content/de/changelog/next.md; then
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send release note email
        if: steps.next_notification.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          ignore_cert: true
          secure: true
          from: ${{ secrets.RELEASE_EMAIL_FROM }}
          to: ${{ secrets.RELEASE_EMAIL_TO }}
          subject: "Nächster Release von I14Y"
          body: |
            Guten Tag,

            am Mittwochabend der nächsten Woche soll eine neue Version der I14Y-Software 
            aufgespielt werden. Die geplanten Neuerungen sind im Handbuch dokumentiert. 
            I14Y-Partnerorganisationen können die aktualisierte Software ab sofort 
            auf der Abnahme-Umgebung von I14Y testen. Bei Rückfragen steht 
            das I14Y-Team gerne zur Verfügung.

            Link zur Seite:
            https://i14y-ch.github.io/handbook/de/changelog/naechster-release/

            Link zur Abnahme-Umgebung:
            https://input.i14y-a.admin.ch

            Kontakt zum I14Y-Team:
            i14y@bfs.admin.ch

            Dies ist eine automatisch generierte E-Mail. Bitte antworten Sie nicht direkt 
            auf diese Nachricht.

