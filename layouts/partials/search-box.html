<div id="search-box" class="search-box">

    type="text"
    placeholder="{{ T "search_placeholder" | default "Search..." }}"
    class="search-input"

    data-search-url="{{ "index.json" | relLangURL }}"
  >
  <div id="search-results" class="search-results" style="display:none;"></div>
</div>
